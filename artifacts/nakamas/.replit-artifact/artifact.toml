kind = "web"
previewPath = "/"
title = "Nakamas"
version = "1.0.0"
id = "artifacts/nakamas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23723

[services.development]
run = "pnpm --filter @workspace/nakamas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nakamas", "run", "build" ]
publicDir = "artifacts/nakamas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23723"
BASE_PATH = "/"
